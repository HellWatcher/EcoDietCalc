name: Build and upload mod DLL

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build Release
        run: dotnet build -c Release mod/EcoDietMod/EcoDietMod.csproj

      - name: Upload DLL to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}"
          mod/EcoDietMod/bin/Release/net8.0/EcoDietMod.dll
          --clobber
